name: Lighthouse CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack for Yarn Berry
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build Next.js app
        run: yarn build

      - name: Start Next.js server in background
        run: yarn start &

      - name: Wait for server to be ready
        run: yarn dlx wait-on http://localhost:3000/en

      - name: Audit URLs using Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:3000/en
          budgetPath: ./ci/lighthouse/budget.json
          configPath: ./ci/lighthouse/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
        env:
           LHCI_GITHUB_TOKEN: ${{ secrets.LHCI_GITHUB_TOKEN }}

      - name: Comment Lighthouse Results on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportDir = '.lighthouseci';
            const manifestPath = `${reportDir}/manifest.json`;
            
            if (!fs.existsSync(manifestPath)) {
              core.setFailed('Lighthouse manifest.json not found!');
              return;
            }

            const manifest = JSON.parse(fs.readFileSync(manifestPath));
            const links = manifest.map(report => report.url).join('\n- ');

            const commentBody = `
            ## 📝 Lighthouse CI Results
            Lighthouse audit reports for this PR:
            - ${links}

            > **Please review the results above before merging!**
            `;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });
